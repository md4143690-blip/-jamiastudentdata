```html
<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জামিয়া ছাত্র ডাটাবেস</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root[data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #10b981;
        }

        :root[data-theme="light"] {
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --text: #0f172a;
            --text-dim: #64748b;
            --primary: #4f46e5;
            --danger: #dc2626;
            --success: #059669;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; }

        header { 
            padding: 0.8rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100;
        }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        .search-box { position: relative; width: 220px; }
        .search-box input { 
            width: 100%; padding: 0.5rem 0.8rem 0.5rem 2.2rem; 
            border-radius: 20px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.05); color: var(--text); outline: none;
        }
        .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-dim); }

        .btn-icon { background: var(--border); border: none; color: var(--text); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        .list-container { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        
        .student-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); 
            cursor: pointer; transition: 0.2s;
        }
        .student-item:hover { background: rgba(99, 102, 241, 0.05); }
        .student-item:last-child { border-bottom: none; }
        
        .student-name-box { display: flex; align-items: center; gap: 12px; }
        .id-badge { background: var(--primary); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .student-name { font-weight: 600; font-size: 1rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 550px; border-radius: 20px; padding: 2rem; position: relative; border: 1px solid var(--border); max-height: 95vh; overflow-y: auto; }

        .profile-header { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .photo-box { text-align: center; }
        .photo-box span { font-size: 0.7rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .img-wrap { width: 100%; aspect-ratio: 1; border-radius: 12px; border: 2px solid var(--primary); overflow: hidden; background: #fff; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .info-grid { display: flex; flex-direction: column; gap: 10px; }
        .info-card { 
            background: rgba(0,0,0,0.03); padding: 10px 15px; border-radius: 10px; 
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .info-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 500; }
        .info-val { font-weight: 600; font-size: 0.95rem; color: var(--text); }
        .btn-copy { background: none; border: none; color: var(--primary); cursor: pointer; padding: 5px; opacity: 0.6; transition: 0.2s; }
        .btn-copy:hover { opacity: 1; transform: scale(1.1); }

        .action-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 0.8rem; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-edit { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 15px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }
        .input { width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.05); color: var(--text); outline: none; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: white; padding: 12px 25px; border-radius: 30px; transition: 0.4s; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 90; }

        .close-modal { position: absolute; top: 15px; right: 15px; color: var(--text-dim); background: none; border: none; cursor: pointer; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="appLoader" class="loading-overlay">
        <div class="spinner"></div>
        <p>সার্ভার থেকে তথ্য আসছে...</p>
    </div>

    <header>
        <div class="logo" style="font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px;">
            <i data-lucide="graduation-cap"></i> জামিয়া ডাটাবেস
        </div>
        <div class="header-actions">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="searchInput" placeholder="খুঁজুন (নাম বা আইডি)...">
            </div>
            <button id="themeToggle" class="btn-icon"><i data-lucide="sun"></i></button>
        </div>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.1rem; opacity: 0.8;">ছাত্রদের তালিকা</h2>
            <span id="count" style="font-size: 0.8rem; background: var(--border); padding: 2px 10px; border-radius: 10px;">০ জন</span>
        </div>
        <div id="studentList" class="list-container"></div>
    </main>

    <button class="fab" onclick="window.openForm()" title="নতুন ছাত্র যোগ করুন"><i data-lucide="plus" size="28"></i></button>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="window.closeModal('detailModal')"><i data-lucide="x"></i></button>
            <div id="detailBody"></div>
        </div>
    </div>

    <!-- Form Modal -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="window.closeModal('formModal')"><i data-lucide="x"></i></button>
            <h3 id="formTitle" style="margin-bottom: 1.5rem;">নতুন ছাত্র যোগ করুন</h3>
            <form id="studentForm">
                <input type="hidden" id="editMode" value="false">
                <div class="form-group">
                    <label>নাম*</label>
                    <input type="text" id="fName" class="input" required>
                </div>
                <div class="form-group">
                    <label>পিতার নাম*</label>
                    <input type="text" id="fFather" class="input" required>
                </div>
                <div class="form-group">
                    <label>বিভাগ*</label>
                    <input type="text" id="fDept" class="input" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>আইডি নং*</label>
                        <input type="text" id="fId" class="input" required>
                    </div>
                    <div class="form-group">
                        <label>রক্তের গ্রুপ</label>
                        <select id="fBlood" class="input">
                            <option value="জানা নেই">নির্বাচন করুন</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>মোবাইল নং*</label>
                    <input type="tel" id="fMobile" class="input" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group"><label>ছাত্রের ছবি</label><input type="file" id="fPhoto" class="input" accept="image/*"></div>
                    <div class="form-group"><label>QR কোড</label><input type="file" id="fQr" class="input" accept="image/*"></div>
                </div>
                <button type="submit" id="saveBtn" class="btn btn-save">তথ্য সেভ করুন</button>
            </form>
        </div>
    </div>

    <div id="toast">সাফল্য!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuaUX20xEpopWvMQSEaxOqsHQwFs7y2SM",
            authDomain: "jamiastudentdata.firebaseapp.com",
            projectId: "jamiastudentdata",
            storageBucket: "jamiastudentdata.firebasestorage.app",
            messagingSenderId: "197739340410",
            appId: "1:197739340410:web:de12fd5f0d6162552ad1c3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colPath = `artifacts/jamia-final-system/public/data/students`;

        let students = [];
        lucide.createIcons();

        async function init() {
            await signInAnonymously(auth);
            onSnapshot(collection(db, colPath), (snap) => {
                students = snap.docs.map(d => d.data());
                students.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
                document.getElementById('count').textContent = students.length + " জন";
                document.getElementById('appLoader').classList.add('hidden');
                render(students);
            });
        }
        init();

        function render(list) {
            const container = document.getElementById('studentList');
            if(list.length === 0) {
                container.innerHTML = `<div style="padding: 3rem; text-align:center; opacity:0.5;">কোনো তথ্য নেই</div>`;
                return;
            }
            container.innerHTML = list.map(s => `
                <div class="student-item" onclick="window.viewStudent('${s.id}')">
                    <div class="student-name-box">
                        <div class="id-badge">${s.id}</div>
                        <span class="student-name">${s.name}</span>
                    </div>
                    <i data-lucide="chevron-right" size="18"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.viewStudent = (id) => {
            const s = students.find(x => x.id === id);
            if(!s) return;
            const body = document.getElementById('detailBody');
            body.innerHTML = `
                <div class="profile-header">
                    <div class="photo-box">
                        <span>ছাত্রের ছবি</span>
                        <div class="img-wrap"><img src="${s.photo || 'https://api.dicebear.com/7.x/initials/svg?seed='+s.name}"></div>
                        <button class="btn" style="background:#555; font-size:0.7rem; padding:4px; width:100%; margin-top:5px;" onclick="window.dl('${s.photo}', '${s.id}_img')">ডাউনলোড</button>
                    </div>
                    <div class="photo-box">
                        <span>QR কোড</span>
                        <div class="img-wrap" style="padding:8px"><img src="${s.qr || 'https://api.qrserver.com/v1/create-qr-code/?data='+s.id}" style="object-fit:contain"></div>
                        <button class="btn" style="background:#555; font-size:0.7rem; padding:4px; width:100%; margin-top:5px;" onclick="window.dl('${s.qr}', '${s.id}_qr')">ডাউনলোড</button>
                    </div>
                </div>
                <div class="info-grid">
                    ${infoRow("নাম", s.name)}
                    ${infoRow("পিতার নাম", s.father)}
                    ${infoRow("বিভাগ", s.dept)}
                    ${infoRow("আইডি নং", s.id)}
                    ${infoRow("রক্তের গ্রুপ", s.blood)}
                    ${infoRow("মোবাইল নং", s.mobile)}
                </div>
                <div class="action-footer">
                    <button class="btn btn-edit" onclick="window.edit('${s.id}')"><i data-lucide="edit"></i> এডিট</button>
                    <button class="btn btn-del" onclick="window.handleDelete('${s.id}')"><i data-lucide="trash-2"></i> মুছুন</button>
                </div>
            `;
            document.getElementById('detailModal').classList.add('show');
            lucide.createIcons();
        };

        function infoRow(label, val) {
            return `
                <div class="info-card">
                    <div>
                        <div class="info-label">${label}</div>
                        <div class="info-val">${val || 'N/A'}</div>
                    </div>
                    <button class="btn-copy" onclick="window.copy('${val}')" title="কপি করুন"><i data-lucide="copy" size="16"></i></button>
                </div>
            `;
        }

        window.copy = (t) => {
            const el = document.createElement('textarea'); el.value = t;
            document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("কপি করা হয়েছে!");
        };

        const compress = (file) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = (e) => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas'); const max = 800;
                    let w = i.width, h = i.height;
                    if(w > max) { h *= max/w; w = max; }
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(i,0,0,w,h);
                    res(c.toDataURL('image/jpeg', 0.8));
                }
            }
        });

        document.getElementById('studentForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = "সেভ হচ্ছে...";
            const id = document.getElementById('fId').value.trim().toUpperCase();
            const isEdit = document.getElementById('editMode').value === "true";
            
            try {
                let photo = null, qr = null;
                if(isEdit) { const old = students.find(x => x.id === id); photo = old.photo; qr = old.qr; }
                const pf = document.getElementById('fPhoto').files[0];
                const qf = document.getElementById('fQr').files[0];
                if(pf) photo = await compress(pf);
                if(qf) qr = await compress(qf);

                await setDoc(doc(db, colPath, id), {
                    id, name: document.getElementById('fName').value.trim(),
                    father: document.getElementById('fFather').value.trim(),
                    dept: document.getElementById('fDept').value.trim(),
                    blood: document.getElementById('fBlood').value,
                    mobile: document.getElementById('fMobile').value.trim(),
                    photo, qr
                });
                showToast("সফলভাবে সেভ হয়েছে!");
                window.closeModal('formModal');
            } catch (err) { showToast("ত্রুটি হয়েছে!", true); }
            finally { btn.disabled = false; btn.textContent = "তথ্য সেভ করুন"; }
        };

        window.openForm = () => {
            document.getElementById('studentForm').reset();
            document.getElementById('fId').disabled = false;
            document.getElementById('editMode').value = "false";
            document.getElementById('formTitle').textContent = "নতুন ছাত্র যোগ করুন";
            document.getElementById('formModal').classList.add('show');
        };

        window.edit = (id) => {
            window.closeModal('detailModal');
            const s = students.find(x => x.id === id);
            document.getElementById('fId').value = s.id; document.getElementById('fId').disabled = true;
            document.getElementById('fName').value = s.name;
            document.getElementById('fFather').value = s.father;
            document.getElementById('fDept').value = s.dept;
            document.getElementById('fBlood').value = s.blood;
            document.getElementById('fMobile').value = s.mobile;
            document.getElementById('editMode').value = "true";
            document.getElementById('formTitle').textContent = "তথ্য এডিট করুন";
            document.getElementById('formModal').classList.add('show');
        };

        window.handleDelete = async (id) => {
            const target = students.find(s => s.id === id);
            if(!target) return;
            if(confirm(`আপনি কি নিশ্চিত যে ${target.name} (ID: ${id}) মুছে ফেলবেন?`)) {
                try {
                    await deleteDoc(doc(db, colPath, id));
                    showToast("তথ্য মুছে ফেলা হয়েছে");
                    window.closeModal('detailModal');
                } catch (e) { showToast("ত্রুটি হয়েছে", true); }
            }
        };

        window.closeModal = (id) => document.getElementById(id).classList.remove('show');
        window.dl = (s, n) => { if(s) { const a = document.createElement('a'); a.href = s; a.download = n+'.jpg'; a.click(); } };

        function showToast(m) {
            const t = document.getElementById('toast'); t.textContent = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('searchInput').oninput = (e) => {
            const v = e.target.value.trim().toUpperCase();
            render(students.filter(s => s.id.toUpperCase().includes(v) || s.name.includes(v)));
        };

        document.getElementById('themeToggle').onclick = () => {
            const h = document.documentElement; const isD = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isD ? 'light' : 'dark');
            document.querySelector('#themeToggle i').setAttribute('data-lucide', isD ? 'moon' : 'sun');
            lucide.createIcons();
        };

    </script>
</body>
</html>
