<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>জামি‘আ ছাত্র ডাটাবেজ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root[data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #10b981;
        }

        :root[data-theme="light"] {
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --text: #0f172a;
            --text-dim: #64748b;
            --primary: #4f46e5;
            --danger: #dc2626;
            --success: #059669;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s; line-height: 1.5; }

        header { 
            padding: 0.8rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-actions { display: flex; align-items: center; gap: 8px; }

        .search-box { position: relative; width: 100%; max-width: 220px; }
        .search-box input { 
            width: 100%; padding: 0.55rem 0.8rem 0.55rem 2.2rem; 
            border-radius: 20px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.05); color: var(--text); outline: none;
            font-size: 0.9rem;
        }
        .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-dim); }

        .btn-icon { background: var(--border); border: none; color: var(--text); padding: 10px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        main { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; padding-bottom: 80px; }
        
        .list-container { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .student-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); 
            cursor: pointer; transition: 0.2s;
        }
        .student-item:active { background: rgba(99, 102, 241, 0.1); }
        .student-item:hover { background: rgba(99, 102, 241, 0.05); }
        .student-item:last-child { border-bottom: none; }
        
        .student-name-box { display: flex; align-items: center; gap: 10px; }
        .id-badge { background: var(--primary); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 8px; font-weight: 600; min-width: 45px; text-align: center; }
        .student-name { font-weight: 600; font-size: 0.95rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 550px; border-radius: 20px; padding: 1.5rem; position: relative; border: 1px solid var(--border); max-height: 95vh; overflow-y: auto; }

        .profile-header { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .photo-box { text-align: center; }
        .photo-box span { font-size: 0.7rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .img-wrap { width: 100%; aspect-ratio: 1; border-radius: 12px; border: 2px solid var(--primary); overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .info-grid { display: flex; flex-direction: column; gap: 8px; }
        .info-card { 
            background: rgba(0,0,0,0.03); padding: 10px 12px; border-radius: 10px; 
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .info-label { font-size: 0.7rem; color: var(--text-dim); font-weight: 500; }
        .info-val { font-weight: 600; font-size: 0.9rem; color: var(--text); }
        .btn-copy { background: none; border: none; color: var(--primary); cursor: pointer; padding: 6px; border-radius: 5px; transition: 0.2s; }
        .btn-copy:active { background: rgba(99, 102, 241, 0.15); }

        .action-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 0.75rem; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.9rem; }
        .btn-edit { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 15px; }

        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
        .input { width: 100%; padding: 0.7rem; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.05); color: var(--text); outline: none; font-size: 0.9rem; }
        .input:focus { border-color: var(--primary); }

        /* Drop Zone Styles */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(0,0,0,0.02);
            position: relative;
        }
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: scale(1.02);
        }
        .drop-zone-text { font-size: 0.65rem; color: var(--text-dim); margin-top: 5px; display: block; }
        .drop-zone-icon { color: var(--primary); opacity: 0.7; }
        .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-mini { margin-top: 8px; width: 40px; height: 40px; border-radius: 6px; border: 1px solid var(--border); display: none; margin-inline: auto; object-fit: cover; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--primary); color: white; padding: 10px 20px; border-radius: 30px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 2000; font-size: 0.85rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 56px; height: 56px; background: var(--primary); color: white; border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 90; }

        .close-modal { position: absolute; top: 12px; right: 12px; color: var(--text-dim); background: rgba(0,0,0,0.05); width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none !important; }

        @media (max-width: 480px) {
            header { padding: 0.8rem 3%; }
            .search-box { max-width: 150px; }
            .modal-content { padding: 1.2rem; border-radius: 15px; }
            .profile-header { gap: 8px; }
            .info-card { padding: 8px 10px; }
            .drop-zone { padding: 10px 5px; }
        }
    </style>
</head>
<body>

    <div id="appLoader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="font-size: 0.9rem;">সার্ভার থেকে তথ্য আসছে...</p>
    </div>

    <header>
        <div class="logo" style="font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 6px;">
            <i data-lucide="graduation-cap" size="20"></i> জামিয়া ডাটাবেস
        </div>
        <div class="header-actions">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="searchInput" placeholder="আইডি/নাম..." autocomplete="off">
            </div>
            <button id="themeToggle" class="btn-icon"><i data-lucide="sun" size="18"></i></button>
        </div>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem;">
            <h2 style="font-size: 1rem; opacity: 0.8; display: flex; align-items: center; gap: 8px;"><i data-lucide="list" size="18"></i> ছাত্রদের তালিকা</h2>
            <span id="count" style="font-size: 0.75rem; background: var(--border); padding: 3px 12px; border-radius: 12px; font-weight: 600;">০ জন</span>
        </div>
        <div id="studentList" class="list-container"></div>
    </main>

    <button class="fab" onclick="window.openForm()" title="নতুন ছাত্র যোগ করুন"><i data-lucide="plus" size="28"></i></button>

    <!-- Detail View Modal -->
    <div id="detailModal" class="modal" onclick="if(event.target==this) window.closeModal('detailModal')">
        <div class="modal-content">
            <button class="close-modal" onclick="window.closeModal('detailModal')"><i data-lucide="x" size="18"></i></button>
            <div id="detailBody"></div>
        </div>
    </div>

    <!-- Form Modal -->
    <div id="formModal" class="modal" onclick="if(event.target==this) window.closeModal('formModal')">
        <div class="modal-content">
            <button class="close-modal" onclick="window.closeModal('formModal')"><i data-lucide="x" size="18"></i></button>
            <h3 id="formTitle" style="margin-bottom: 1.2rem; font-size: 1.1rem;">ছাত্রের তথ্য ফরম</h3>
            <form id="studentForm">
                <input type="hidden" id="editMode" value="false">
                
                <div class="form-group">
                    <label>নাম*</label>
                    <input type="text" id="fName" class="input" required placeholder="ছাত্রের পূর্ণ নাম">
                </div>
                
                <div class="form-group">
                    <label>পিতার নাম*</label>
                    <input type="text" id="fFather" class="input" required placeholder="পিতার নাম">
                </div>
                
                <div class="form-group">
                    <label>বিভাগ*</label>
                    <input type="text" id="fDept" class="input" required placeholder="বিভাগের নাম">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>আইডি নং*</label>
                        <input type="text" id="fId" class="input" required placeholder="S101">
                    </div>
                    <div class="form-group">
                        <label>রক্তের গ্রুপ</label>
                        <select id="fBlood" class="input">
                            <option value="জানা নেই">নির্বাচন করুন</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>মোবাইল নং*</label>
                    <input type="tel" id="fMobile" class="input" required placeholder="017xxxxxxxx">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 5px;">
                    <!-- Photo Drop Zone -->
                    <div class="form-group">
                        <label>ছাত্রের ছবি</label>
                        <div class="drop-zone" id="dzPhoto">
                            <i data-lucide="image" class="drop-zone-icon" size="20"></i>
                            <span class="drop-zone-text">ড্রাগ করুন বা ক্লিক করুন</span>
                            <input type="file" id="fPhoto" accept="image/*">
                            <img id="prevPhoto" class="preview-mini">
                        </div>
                    </div>
                    <!-- QR Drop Zone -->
                    <div class="form-group">
                        <label>QR কোড</label>
                        <div class="drop-zone" id="dzQr">
                            <i data-lucide="qr-code" class="drop-zone-icon" size="20"></i>
                            <span class="drop-zone-text">ড্রাগ করুন বা ক্লিক করুন</span>
                            <input type="file" id="fQr" accept="image/*">
                            <img id="prevQr" class="preview-mini">
                        </div>
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="btn btn-save">তথ্য সেভ করুন</button>
            </form>
        </div>
    </div>

    <div id="toast">সাফল্য!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuaUX20xEpopWvMQSEaxOqsHQwFs7y2SM",
            authDomain: "jamiastudentdata.firebaseapp.com",
            projectId: "jamiastudentdata",
            storageBucket: "jamiastudentdata.firebasestorage.app",
            messagingSenderId: "197739340410",
            appId: "1:197739340410:web:de12fd5f0d6162552ad1c3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colPath = `artifacts/jamia-final-system/public/data/students`;

        let students = [];
        lucide.createIcons();

        // Data Management
        async function init() {
            try {
                await signInAnonymously(auth);
                onSnapshot(collection(db, colPath), (snap) => {
                    students = snap.docs.map(d => d.data());
                    students.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
                    document.getElementById('count').textContent = students.length + " জন";
                    document.getElementById('appLoader').classList.add('hidden');
                    render(students);
                });
            } catch (error) {
                console.error("Auth failed", error);
            }
        }
        init();

        // Drop Zone Handlers
        const setupDropZone = (zoneId, inputId, previewId) => {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);

            ['dragenter', 'dragover'].forEach(name => {
                zone.addEventListener(name, e => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
            });

            ['dragleave', 'drop'].forEach(name => {
                zone.addEventListener(name, e => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                });
            });

            zone.addEventListener('drop', e => {
                const files = e.dataTransfer.files;
                if(files.length) {
                    input.files = files;
                    handlePreview(files[0], preview, zone);
                }
            });

            input.addEventListener('change', () => {
                if(input.files.length) {
                    handlePreview(input.files[0], preview, zone);
                }
            });
        };

        const handlePreview = (file, imgEl, zoneEl) => {
            if(!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = e => {
                imgEl.src = e.target.result;
                imgEl.style.display = 'block';
                zoneEl.querySelector('.drop-zone-icon').style.display = 'none';
                zoneEl.querySelector('.drop-zone-text').textContent = 'ফাইল রেডি';
            };
            reader.readAsDataURL(file);
        };

        setupDropZone('dzPhoto', 'fPhoto', 'prevPhoto');
        setupDropZone('dzQr', 'fQr', 'prevQr');

        function render(list) {
            const container = document.getElementById('studentList');
            if(list.length === 0) {
                container.innerHTML = `<div style="padding: 3rem; text-align:center; opacity:0.5; font-size:0.9rem;">কোনো তথ্য পাওয়া যায়নি</div>`;
                return;
            }
            container.innerHTML = list.map(s => `
                <div class="student-item" onclick="window.viewStudent('${s.id}')">
                    <div class="student-name-box">
                        <div class="id-badge">${s.id}</div>
                        <span class="student-name">${s.name}</span>
                    </div>
                    <i data-lucide="chevron-right" size="16"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.viewStudent = (id) => {
            const s = students.find(x => x.id === id);
            if(!s) return;
            const body = document.getElementById('detailBody');
            body.innerHTML = `
                <div class="profile-header">
                    <div class="photo-box">
                        <span>ছাত্রের ছবি</span>
                        <div class="img-wrap"><img src="${s.photo || 'https://api.dicebear.com/7.x/initials/svg?seed='+s.name}"></div>
                        <button class="btn" style="background:#555; font-size:0.65rem; padding:4px; width:100%; margin-top:5px; color:white;" onclick="window.dl('${s.photo}', '${s.id}_img')">ডাউনলোড</button>
                    </div>
                    <div class="photo-box">
                        <span>QR কোড</span>
                        <div class="img-wrap" style="padding:8px"><img src="${s.qr || 'https://api.qrserver.com/v1/create-qr-code/?data='+s.id}" style="object-fit:contain"></div>
                        <button class="btn" style="background:#555; font-size:0.65rem; padding:4px; width:100%; margin-top:5px; color:white;" onclick="window.dl('${s.qr}', '${s.id}_qr')">ডাউনলোড</button>
                    </div>
                </div>
                <div class="info-grid">
                    ${infoRow("নাম", s.name)}
                    ${infoRow("পিতার নাম", s.father)}
                    ${infoRow("বিভাগ", s.dept)}
                    ${infoRow("আইডি নং", s.id)}
                    ${infoRow("রক্তের গ্রুপ", s.blood)}
                    ${infoRow("মোবাইল নং", s.mobile)}
                </div>
                <div class="action-footer">
                    <button class="btn btn-edit" onclick="window.edit('${s.id}')"><i data-lucide="edit-3" size="16"></i> এডিট</button>
                    <button class="btn btn-del" onclick="window.handleDelete('${s.id}')"><i data-lucide="trash-2" size="16"></i> মুছুন</button>
                </div>
            `;
            document.getElementById('detailModal').classList.add('show');
            lucide.createIcons();
        };

        function infoRow(label, val) {
            return `
                <div class="info-card">
                    <div>
                        <div class="info-label">${label}</div>
                        <div class="info-val">${val || 'N/A'}</div>
                    </div>
                    <button class="btn-copy" onclick="window.copy('${val}')" title="কপি করুন"><i data-lucide="copy" size="14"></i></button>
                </div>
            `;
        }

        window.copy = (t) => {
            const el = document.createElement('textarea'); el.value = t;
            document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("কপি করা হয়েছে!");
        };

        const compress = (file) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = (e) => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas'); const max = 800;
                    let w = i.width, h = i.height;
                    if(w > max) { h *= max/w; w = max; }
                    c.width = w; c.height = h;
                    const ctx = c.getContext('2d');
                    ctx.drawImage(i,0,0,w,h);
                    res(c.toDataURL('image/jpeg', 0.8));
                }
            }
        });

        document.getElementById('studentForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = "সেভ হচ্ছে...";
            const id = document.getElementById('fId').value.trim().toUpperCase();
            const isEdit = document.getElementById('editMode').value === "true";
            
            try {
                let photo = null, qr = null;
                if(isEdit) { 
                    const old = students.find(x => x.id === id); 
                    photo = old.photo; 
                    qr = old.qr; 
                }
                const pf = document.getElementById('fPhoto').files[0];
                const qf = document.getElementById('fQr').files[0];
                if(pf) photo = await compress(pf);
                if(qf) qr = await compress(qf);

                await setDoc(doc(db, colPath, id), {
                    id, name: document.getElementById('fName').value.trim(),
                    father: document.getElementById('fFather').value.trim(),
                    dept: document.getElementById('fDept').value.trim(),
                    blood: document.getElementById('fBlood').value,
                    mobile: document.getElementById('fMobile').value.trim(),
                    photo, qr
                });
                showToast("সফলভাবে সেভ হয়েছে!");
                window.closeModal('formModal');
            } catch (err) { showToast("ত্রুটি হয়েছে!", true); }
            finally { btn.disabled = false; btn.textContent = "তথ্য সেভ করুন"; }
        };

        window.openForm = () => {
            document.getElementById('studentForm').reset();
            resetDropZones();
            document.getElementById('fId').disabled = false;
            document.getElementById('editMode').value = "false";
            document.getElementById('formTitle').textContent = "নতুন ছাত্র যোগ করুন";
            document.getElementById('formModal').classList.add('show');
        };

        const resetDropZones = () => {
            ['dzPhoto', 'dzQr'].forEach(id => {
                const dz = document.getElementById(id);
                dz.querySelector('.preview-mini').style.display = 'none';
                dz.querySelector('.drop-zone-icon').style.display = 'block';
                dz.querySelector('.drop-zone-text').textContent = 'ড্রাগ করুন বা ক্লিক করুন';
            });
        };

        window.edit = (id) => {
            window.closeModal('detailModal');
            const s = students.find(x => x.id === id);
            if(!s) return;
            resetDropZones();
            document.getElementById('fId').value = s.id; document.getElementById('fId').disabled = true;
            document.getElementById('fName').value = s.name;
            document.getElementById('fFather').value = s.father;
            document.getElementById('fDept').value = s.dept;
            document.getElementById('fBlood').value = s.blood;
            document.getElementById('fMobile').value = s.mobile;
            document.getElementById('editMode').value = "true";
            
            if(s.photo) {
                const prev = document.getElementById('prevPhoto');
                prev.src = s.photo; prev.style.display = 'block';
                document.getElementById('dzPhoto').querySelector('.drop-zone-icon').style.display = 'none';
            }
            if(s.qr) {
                const prev = document.getElementById('prevQr');
                prev.src = s.qr; prev.style.display = 'block';
                document.getElementById('dzQr').querySelector('.drop-zone-icon').style.display = 'none';
            }

            document.getElementById('formTitle').textContent = "তথ্য এডিট করুন";
            document.getElementById('formModal').classList.add('show');
        };

        window.handleDelete = async (id) => {
            const target = students.find(s => s.id === id);
            if(!target) return;
            if(confirm(`আপনি কি নিশ্চিত যে ${target.name} (ID: ${id}) এর সকল তথ্য মুছে ফেলবেন?`)) {
                try {
                    await deleteDoc(doc(db, colPath, id));
                    showToast("তথ্য মুছে ফেলা হয়েছে");
                    window.closeModal('detailModal');
                } catch (e) { showToast("ত্রুটি হয়েছে", true); }
            }
        };

        window.closeModal = (id) => document.getElementById(id).classList.remove('show');
        
        window.dl = (s, n) => { 
            if(s) { 
                const a = document.createElement('a'); a.href = s; a.download = n + '.jpg'; 
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            } else showToast("ছবি পাওয়া যায়নি");
        };

        function showToast(m) {
            const t = document.getElementById('toast'); t.textContent = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('searchInput').oninput = (e) => {
            const v = e.target.value.trim().toUpperCase();
            render(students.filter(s => s.id.toUpperCase().includes(v) || s.name.includes(v)));
        };

        document.getElementById('themeToggle').onclick = () => {
            const h = document.documentElement; 
            const isD = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isD ? 'light' : 'dark');
            document.querySelector('#themeToggle i').setAttribute('data-lucide', isD ? 'moon' : 'sun');
            lucide.createIcons();
        };

    </script>
</body>
</html>
